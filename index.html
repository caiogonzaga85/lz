<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LZ Barber</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>
<body>

<!-- ÁUDIO AUTOMÁTICO + LOOP -->
<audio id="bgMusic" autoplay loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- BOTÃO PAUSE/PLAY DA MÚSICA -->
<div id="musicBtn" class="music-btn">🔊</div>

<!-- ÍCONE DO MENU – FUNCIONA E NÃO SOME MAIS -->
<div class="menu-button" onclick="toggleMenu()">☰</div>

<!-- MENU DROPDOWN -->
<div id="dropdownMenu" class="dropdown-menu">

    <button class="menu-item" data-page="ref" onclick="navigate('ref')">Referências</button>

    <button class="menu-item" onclick="window.location='localizacao.html'">Localização</button>

    <button class="menu-item" onclick="window.location='contato.html'">Contato</button>

    <!-- NOVA ABA ON/OFF DENTRO DO MENU -->
    <button class="menu-item" onclick="window.location='status.html'">ON/OFF</button>

    <!-- BOTÃO PERSONALIZADO INSTALAR APP -->
    <button id="installButton" class="menu-item install-app-btn" style="display:none;">
        📲 Instalar App
    </button>

</div>

<!-- FAIXA BRANCA + LOGO -->
<div class="header">
    <img src="img/branca.jpg" alt="LZ Barber">
</div>


<!-- TELAS -->
<div id="app">

    <!-- Página de Referências -->
    <section id="ref" class="page active">
        <h1>Trabalhos 💈</h1>

        <div class="cards">

            <div class="main-card" onclick="navigate('pig')">
                <img src="img/pig1.jpg" alt="Pigmentações">
                <div class="overlay"><h2>Pigmentações</h2></div>
            </div>

            <div class="main-card" onclick="navigate('nevou')">
                <img src="img/nevou1.jpg" alt="Nevou">
                <div class="overlay"><h2>Nevou</h2></div>
            </div>

            <div class="main-card" onclick="navigate('reflexos')">
                <img src="img/reflexo.jpg" alt="Reflexos">
                <div class="overlay"><h2>Reflexos</h2></div>
            </div>

        </div>
    </section>

    
    <!-- Página Pigmentações -->
    <section id="pig" class="page">
        <button class="back-btn" onclick="navigate('ref')">← Voltar</button>
        <h1>Pigmentações</h1>

        <div class="cards">
            <div class="card"><img src="img/pig2.jpg"></div>
            <div class="card"><img src="img/pig3.jpg"></div>
            <div class="card"><img src="img/pig4.jpg"></div>
        </div>
    </section>

    <!-- Página Nevou -->
    <section id="nevou" class="page">
        <button class="back-btn" onclick="navigate('ref')">← Voltar</button>
        <h1>Nevou</h1>

        <div class="cards">
           <div class="card"><img src="img/nevou2.jpg"></div>
        <button class="back-btn" onclick="navigate('ref')">← Voltar</button>
        <h1>Reflexos</h1>

        <div class="cards">
            <div class="card">img/reflexo.jpg</div>
            <div class="card"><img src="img/reflexo1.jpg"></div>
        </div>
    </section>

</div>

<script src="script.js"></script>

<!-- SCRIPT PARA GARANTIR AUTOPLAY NO CELULAR + BOTÃO PAUSE -->
<script>
const audio = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");

let isPlaying = true;

// Força tocar no primeiro clique (iOS/Android exigem interação)
document.addEventListener('click', function firstPlay() {
    audio.play();
    document.removeEventListener('click', firstPlay);
});

// Controle do botão
musicBtn.addEventListener("click", () => {
    if (isPlaying) {
        audio.pause();
        musicBtn.textContent = "🔇"; // Ícone mute
        isPlaying = false;
    } else {
        audio.play();
        musicBtn.textContent = "🔊"; // Ícone som
        isPlaying = true;
    }
});
</script>

<!-- REGISTRO DO SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("✅ Service Worker registrado"))
    .catch(err => console.log("❌ Erro no SW", err));
}
</script>

<script>
let deferredPrompt;
const installButton = document.getElementById("installButton");

window.addEventListener("beforeinstallprompt", (event) => {
    event.preventDefault();
    deferredPrompt = event;
    installButton.style.display = "block";
});

// botão clicado
installButton.addEventListener("click", async () => {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();

    const result = await deferredPrompt.userChoice;
    console.log("Instalação:", result.outcome);

    deferredPrompt = null;
    installButton.style.display = "none";
});

// MOSTRAR O BOTÃO MESMO QUE O EVENTO NÃO DISPARAR
setTimeout(() => {
    if (!deferredPrompt) {
        installButton.style.display = "block";
    }
}, 2000);
</script>


</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LZ Barber</title>

    <!-- CSS CORRETO -->
    <link rel="stylesheet" href="style.css">

    <!-- MANIFEST CORRETO -->
    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#000000">
</head>

<body>

<!-- ÁUDIO -->
<audio id="bgMusic" autoplay loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<div id="musicBtn" class="music-btn">🔊</div>

<!-- MENU -->
<div class="menu-button" onclick="toggleMenu()">☰</div>

<div id="dropdownMenu" class="dropdown-menu">
    <button class="menu-item" onclick="navigate('ref')">Referências</button>
    <button class="menu-item" onclick="window.location='localizacao.html'">Localização</button>
    <button class="menu-item" onclick="window.location='contato.html'">Contato</button>
    <button class="menu-item" onclick="window.location='status.html'">ON/OFF</button>

    <button id="installButton" class="menu-item install-app-btn" style="display:none;">
        📲 Instalar App
    </button>
</div>

<!-- HEADER -->
<div class="header">
    <img src="img/branca.jpg" alt="LZ Barber">
</div>

<!-- CONTEÚDO -->
<div id="app">

    <!-- REFERÊNCIAS -->
    <section id="ref" class="page active">
        <h1>Trabalhos 💈</h1>

        <div class="cards">

            <div class="main-card" onclick="navigate('pig')">
                <img src="img/pig1.jpg" alt="Pigmentações">
                <div class="overlay"><h2>Pigmentações</h2></div>
            </div>

            <div class="main-card" onclick="navigate('nevou')">
                <img src="img/nevou1.jpg" alt="Nevou">
                <div class="overlay"><h2>Nevou</h2></div>
            </div>

            <div class="main-card" onclick="navigate('reflexos')">
                <img src="img/reflexo.jpg" alt="Reflexos">
                <div class="overlay"><h2>Reflexos</h2></div>
            </div>

        </div>
    </section>

    <!-- PIGMENTAÇÕES -->
    <section id="pig" class="page">
        <button class="back-btn" onclick="navigate('ref')">← Voltar</button>

        <h1>Pigmentações</h1>

        <div class="cards">
            <div class="card"><img src="img/pig2.jpg" alt=""></div>
            <div class="card"><img src="img/pig3.jpg" alt=""></div>
            <div class="card"><img src="img/pig4.jpg" alt=""></div>
        </div>
    </section>

    <!-- NEVOU -->
    <section id="nevou" class="page">
        <button class="back-btn" onclick="navigate('ref')">← Voltar</button>

        <h1>Nevou</h1>

        <div class="cards">
            <div class="card"><img src="img/nevou2.jpg" alt=""></div>
            <div class="card"><img src="img/nevou3.jpg" alt=""></div>
            <div class="card"><img src="img/nevou4.jpg" alt=""></div>
        </div>
    </section>

    <!-- REFLEXOS -->
    <section id="reflexos" class="page">
        <button class="back-btn" onclick="navigate('ref')">← Voltar</button>

        <h1>Reflexos</h1>

        <div class="cards">
            <div class="card"><img src="img/reflexo.jpg" alt=""></div>
            <div class="card"><img src="img/reflexo1.jpg" alt=""></div>
        </div>
    </section>

</div>

<!-- SCRIPT PRINCIPAL -->
<script src="script.js"></script>

<!-- PLAY/PAUSE -->
<script>
const audio = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");
let isPlaying = true;

document.addEventListener('click', function firstPlay() {
    audio.play();
    document.removeEventListener('click', firstPlay);
});

musicBtn.addEventListener("click", () => {
    if (isPlaying) {
        audio.pause();
        musicBtn.textContent = "🔇";
        isPlaying = false;
    } else {
        audio.play();
        musicBtn.textContent = "🔊";
        isPlaying = true;
    }
});
</script>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

<!-- INSTALAR APP -->
<script>
let deferredPrompt;
const installButton = document.getElementById("installButton");

window.addEventListener("beforeinstallprompt", (event) => {
    event.preventDefault();
    deferredPrompt = event;
    installButton.style.display = "block";
});

installButton.addEventListener("click", async () => {
    deferredPrompt.prompt();
    deferredPrompt = null;
    installButton.style.display = "none";
});

setTimeout(() => {
    if (!deferredPrompt) installButton.style.display = "block";
}, 2000);
</script>

</body>
</html>

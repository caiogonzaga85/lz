<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
body{
    background:#000;
    color:#fff;
    padding:30px;
    font-family:Arial;
}
button{
    padding:10px 15px;
    background:#fff;
    border:none;
    cursor:pointer;
    margin-top:20px;
}
.status-box, .notif-box{
    margin-top:40px;
    background:#111;
    padding:20px;
    border-radius:10px;
    width:320px;
    text-align:center;
    margin-bottom:30px;
}
input{
    width:90%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:5px;
}
</style>
</head>

<body>

<h1>Painel Admin</h1>
<p>Bem-vindo à área privada.</p>

<!-- STATUS DA BARBEARIA -->
<div class="status-box">
    <h2>Status da Barbearia:</h2>
    <h1 id="statusTexto">Carregando...</h1>

    <button id="btnToggle" onclick="toggleStatus()">Carregar...</button>
</div>

<div class="notif-box">
    <h2>Abrir Instagram</h2>
    <p>Toque para abrir o Instagram e postar nos stories.</p>
    <button onclick="abrirInstagram()">Abrir Instagram</button>
</div>

<!-- ENVIAR MENSAGEM PARA WHATSAPP -->
<div class="notif-box">
    <h2>Enviar Mensagem no WhatsApp</h2>
    <p>Enviar mensagem no grupo da barbearia no WhatsApp:</p>
    <button onclick="enviarWpp()">Enviar no WhatsApp</button>
</div>
<button onclick="copiarEabrir()">Copiar texto e ir pro wpp(aberto ou fechado)</button>
<p id="statusCopyMsg" style="color:lightgreen; margin-top:10px;"></p>

<div class="notif-box">
    <h2>Baixar imagem do Story</h2>
    <p>Clique para baixar a imagem pronta para postar.</p>
    <button onclick="baixarImagem()">Baixar imagem</button>
</div>

<!-- BOTÃO DE SAIR -->
<button onclick="logout()" style="background:red;color:white;">Sair</button>

<script src="../auth.js"></script>

</body>
</html>

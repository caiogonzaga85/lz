<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status da Barbearia</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER MESMO DO INDEX -->
<div class="header">
    <img src="img/branca.jpg" alt="LZ Barber">
</div>

<div id="app">

    <section class="page active">
        <h1>Status da Barbearia 💈</h1>

        <div style="text-align:center; margin-top:40px;">
            <h2 style="font-size:30px;">
                <span id="statusIcon">🟡</span>
                <span id="statusText">Carregando...</span>
            </h2>

            <button class="back-btn" onclick="window.location='index.html'">
                ← Voltar ao início
            </button>
        </div>

    </section>

</div>

<script>
    // LER STATUS DEFINIDO NO PAINEL
    function carregarStatus() {
        let estado = localStorage.getItem("estadoBarbearia");

        const statusText = document.getElementById("statusText");
        const statusIcon = document.getElementById("statusIcon");

        if (!estado) {
            estado = "fechada";
        }

        if (estado === "aberta") {
            statusText.textContent = "Estamos abertos!";
            statusText.style.color = "lightgreen";
            statusIcon.textContent = "🟢";
        } else {
            statusText.textContent = "Fechado no momento.";
            statusText.style.color = "red";
            statusIcon.textContent = "🔴";
        }
    }

    carregarStatus();
</script>

</body>
</html>
